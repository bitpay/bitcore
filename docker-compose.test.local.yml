services:

  # This is a docker runner that communicates with the other containers in docker-compose.test.base.yml
  test_runner:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${DOCKER_UID}:${DOCKER_GID}"
    volumes:
      - .:/bitcore
    ports:
      - 8100:8100
      - 3000:3000
    environment:
      - DB_HOST=db
      - DB_NAME=bitcore-test
      - BITCORE_CONFIG_PATH=/bitcore/bitcore-test.local.config.json
    depends_on:
      - db
      - bitcoin
      - erigon
      - geth
      - rippled
